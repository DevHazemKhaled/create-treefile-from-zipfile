<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج شجرة ملفات Zip الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #202024;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #00adb5; }
        .upload-box {
            border: 2px dashed #00adb5;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            background: #29292e;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .upload-box:hover { background: #323238; }
        input[type="file"] { display: none; }
        .btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: none;
            margin: 15px auto;
            font-size: 16px;
        }
        .btn:hover { background-color: #008c95; }
        pre {
            background: #121214;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre; 
            font-family: 'Courier New', Courier, monospace;
            color: #00ff66;
            direction: ltr; 
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #29292e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مستخرج هيكل ملفات Zip 📂</h1>
    <p style="text-align: center; color: #a8a8b3;">تم حل مشكلة المجلدات وتوليد شجرة حقيقية دقيقة 100%</p>
    
    <div class="upload-box" onclick="document.getElementById('zipInput').click()">
        <p id="uploadText">اضغط هنا لاختيار ملف الـ ZIP</p>
        <input type="file" id="zipInput" accept=".zip">
    </div>

    <button id="downloadBtn" class="btn">تحميل الشجرة كـ ملف Text</button>
    
    <pre id="output">شجرة الملفات ستظهر هنا...</pre>
</div>

<script>
    let generatedTreeText = "";

    document.getElementById('zipInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('uploadText').innerText = `الملف المختار: ${file.name}`;
        document.getElementById('output').innerText = "جاري قراءة الملف وتوليد الشجرة الذكية...";

        const reader = new FileReader();
        reader.onload = function(event) {
            JSZip.loadAsync(event.target.result).then(function(zip) {
                
                // 1. بناء هيكل الشجرة في الذاكرة (Tree Object)
                let root = { folders: {}, files: [] };

                Object.keys(zip.files).forEach(function(path) {
                    if (path.trim() === "" || path === "/") return;
                    
                    // تقسيم المسار إلى أجزاء
                    let parts = path.split('/').filter(p => p.length > 0);
                    let current = root;

                    // لو المسار آخره / يعني مجلد، إذن كل الأجزاء عبارة عن مجلدات
                    // لو مش آخره / يعني الجزء الأخير عبارة عن ملف
                    let isFolder = path.endsWith('/');
                    
                    for (let i = 0; i < parts.length; i++) {
                        let part = parts[i];
                        
                        if (i === parts.length - 1 && !isFolder) {
                            // إذا كان العنصر الأخير وهو ملف، ضعه في قائمة الملفات لو مش موجود
                            if (!current.files.includes(part)) {
                                current.files.push(part);
                            }
                        } else {
                            // إذا كان مجلد، أنشئه لو مش موجود وتحرك جواه
                            if (!current.folders[part]) {
                                current.folders[part] = { folders: {}, files: [] };
                            }
                            current = current.folders[part];
                        }
                    }
                });

                // 2. دالة طباعة الشجرة بشكل نصي منسق ورأسي
                let treeOutput = "";
                
                function renderTree(node, depth = 0) {
                    let indent = "    ".repeat(depth);
                    
                    // طباعة المجلدات أولاً بترتيب أبجدي
                    let sortedFolders = Object.keys(node.folders).sort();
                    sortedFolders.forEach(function(folderName) {
                        treeOutput += `${indent}├── 📁 ${folderName}/\n`;
                        // طباعة محتويات المجلد الفرعي (زيادة العمق + 1)
                        renderTree(node.folders[folderName], depth + 1);
                    });

                    // طباعة الملفات بعد المجلدات بترتيب أبجدي
                    let sortedFiles = node.files.sort();
                    sortedFiles.forEach(function(fileName) {
                        treeOutput += `${indent}└── 📄 ${fileName}\n`;
                    });
                }

                // تشغيل الطباعة من المجلد الرئيسي
                renderTree(root, 0);

                // عرض النتيجة وتفعيل زر التحميل
                generatedTreeText = treeOutput;
                document.getElementById('output').innerText = treeOutput;
                document.getElementById('downloadBtn').style.display = "block";

            }).catch(function(err) {
                document.getElementById('output').innerText = "خطأ في قراءة ملف الـ Zip: " + err.message;
            });
        };

        reader.readAsArrayBuffer(file);
    });

    // تحميل النتيجة كملف نصي منسق
    document.getElementById('downloadBtn').addEventListener('click', function() {
        const blob = new Blob([generatedTreeText], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "project_tree.txt";
        link.click();
    });
</script>

</body>
</html>
