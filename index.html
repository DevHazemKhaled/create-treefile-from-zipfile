<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج شجرة ملفات Zip المتصلة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #202024;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #00adb5; }
        .upload-box {
            border: 2px dashed #00adb5;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            background: #29292e;
            margin-bottom: 20px;
            transition: background 0.3s;
        }
        .upload-box:hover { background: #323238; }
        input[type="file"] { display: none; }
        .btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: none;
            margin: 15px auto;
            font-size: 16px;
        }
        .btn:hover { background-color: #008c95; }
        pre {
            background: #121214;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre; 
            font-family: 'Courier New', Courier, monospace;
            color: #00ff66;
            direction: ltr; /* لضمان رسم الخطوط المتصلة بشكل صحيح من اليسار لليمين */
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #29292e;
            font-size: 14px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>مستخرج هيكل ملفات Zip المتصل 📂</h1>
    <p style="text-align: center; color: #a8a8b3;">شجرة متصلة بالكامل بدون مسافات فارغة لرؤية الهيكل بوضوح</p>
    
    <div class="upload-box" onclick="document.getElementById('zipInput').click()">
        <p id="uploadText">اضغط هنا لاختيار ملف الـ ZIP</p>
        <input type="file" id="zipInput" accept=".zip">
    </div>

    <button id="downloadBtn" class="btn">تحميل الشجرة كـ ملف Text</button>
    
    <pre id="output">شجرة الملفات ستظهر هنا...</pre>
</div>

<script>
    let generatedTreeText = "";

    document.getElementById('zipInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        document.getElementById('uploadText').innerText = `الملف المختار: ${file.name}`;
        document.getElementById('output').innerText = "جاري بناء الشجرة المتصلة...";

        const reader = new FileReader();
        reader.onload = function(event) {
            JSZip.loadAsync(event.target.result).then(function(zip) {
                
                // 1. بناء الهيكل في الذاكرة
                let root = { folders: {}, files: [] };

                Object.keys(zip.files).forEach(function(path) {
                    if (path.trim() === "" || path === "/") return;
                    
                    let parts = path.split('/').filter(p => p.length > 0);
                    let current = root;
                    let isFolder = path.endsWith('/');
                    
                    for (let i = 0; i < parts.length; i++) {
                        let part = parts[i];
                        if (i === parts.length - 1 && !isFolder) {
                            if (!current.files.includes(part)) current.files.push(part);
                        } else {
                            if (!current.folders[part]) {
                                current.folders[part] = { folders: {}, files: [] };
                            }
                            current = current.folders[part];
                        }
                    }
                });

                // 2. دالة الطباعة المتصلة ذكياً باستخدام مصفوفة للحفاظ على الخطوط الرأسية
                let treeOutput = "";
                
                function renderTree(node, prefix = "") {
                    let sortedFolders = Object.keys(node.folders).sort();
                    let sortedFiles = node.files.sort();
                    
                    let totalElements = sortedFolders.length + sortedFiles.length;
                    let currentIndex = 0;

                    // طباعة المجلدات أولاً
                    sortedFolders.forEach(function(folderName) {
                        currentIndex++;
                        let isLast = (currentIndex === totalElements);
                        
                        // تحديد شكل التوصيلة (هل هي آخر عنصر في المجلد الحالي أم لا)
                        let pointer = isLast ? "└── " : "├── ";
                        
                        treeOutput += `${prefix}${pointer}📁 ${folderName}/\n`;
                        
                        // تمديد الخط الرأسي للمجلدات الفرعية لو مش الأخيرة
                        let newPrefix = prefix + (isLast ? "    " : "│   ");
                        renderTree(node.folders[folderName], newPrefix);
                    });

                    // طباعة الملفات
                    sortedFiles.forEach(function(fileName) {
                        currentIndex++;
                        let isLast = (currentIndex === totalElements);
                        let pointer = isLast ? "└── " : "├── ";
                        
                        treeOutput += `${prefix}${pointer}📄 ${fileName}\n`;
                    });
                }

                // تشغيل الطباعة من المجلد الرئيسي باسم الملف المختار
                treeOutput += `📁 ${file.name}\n`;
                renderTree(root, "");

                // عرض وتحميل النتيجة
                generatedTreeText = treeOutput;
                document.getElementById('output').innerText = treeOutput;
                document.getElementById('downloadBtn').style.display = "block";

            }).catch(function(err) {
                document.getElementById('output').innerText = "خطأ في قراءة ملف الـ Zip: " + err.message;
            });
        };

        reader.readAsArrayBuffer(file);
    });

    document.getElementById('downloadBtn').addEventListener('click', function() {
        const blob = new Blob([generatedTreeText], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "connected_project_tree.txt";
        link.click();
    });
</script>

</body>
</html>
